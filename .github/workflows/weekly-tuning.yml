name: Weekly Tuning

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tuning-500-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark
        run: npm run benchmark

      - name: Run 500 corpus quick tuning
        run: npm run tune:500:quick

      - name: Run regression quality gate
        run: npm run regression:check

      - name: Upload tuning artifacts
        uses: actions/upload-artifact@v5
        with:
          name: fixyoursecret-weekly-500-regression
          path: |
            docs/tuning/report-500.json
            docs/tuning/false-positive-review-500.md
