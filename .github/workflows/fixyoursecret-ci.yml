name: FixYourSecret CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Initialize FixYourSecret baseline/config (if missing)
        run: node ./bin/index.js init

      - name: Run FixYourSecret CI scan (SARIF)
        run: node ./bin/index.js ci --output-file fixyoursecret.sarif --fail-on high --verify safe

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: fixyoursecret.sarif
          category: fixyoursecret

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fixyoursecret-sarif
          path: fixyoursecret.sarif
