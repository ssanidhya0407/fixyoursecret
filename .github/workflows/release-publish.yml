name: Release Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Use latest npm (trusted publisher support)
        run: |
          npm i -g npm@latest
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run benchmark quality gate
        env:
          BENCH_MIN_RECALL: "0.95"
          BENCH_MIN_PRECISION: "0.95"
        run: npm run benchmark

      - name: Run 500 quick regression gate
        run: npm run tune:500:quick && npm run regression:check

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish to npm (latest)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm whoami
            npm publish --access public
          else
            npm publish --access public --provenance
          fi
